name: qibla_compass_app
description: "A Qibla compass, prayer times, and mosque finder app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_compass: ^0.8.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  adhan: ^2.0.0+1
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # New dependencies
  http: ^1.2.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/SPLASH.png
    - assets/images/qibla comapss.png